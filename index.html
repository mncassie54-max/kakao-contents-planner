<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kakao Contents Planner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="appbar">
    <div class="brand"><span class="dot">📮</span> Kakao Contents Planner <small>· DI</small></div>
    <nav>
      <button id="newBtn" class="btn primary sm">+ 새 콘텐츠</button>
      <button id="statsBtn" class="btn ghost sm">📥 오픈데이터</button>
      <button id="catBtn" class="btn ghost sm">🏷 카테고리</button>
      <a class="btn ghost sm" href="./report.html">리포트</a>
    </nav>
  </header>

  <main class="container">
    <section id="stats" class="stats"></section>

    <section class="card wk">
      <div class="card-head">
        <h3>🗓️ 이번 주 발송 준비</h3>
        <span class="sub" id="wkSummary"></span>
      </div>
      <div class="progress"><i id="wkBar" style="width:0%"></i></div>
      <div class="wk-list" id="wkList"></div>
    </section>

    <section class="card">
      <div class="cal-toolbar">
        <span class="month-nav" id="monthNav">
          <button class="btn icon" id="prevBtn" aria-label="이전 달">←</button>
          <span class="month" id="monthLabel"></span>
          <button class="btn icon" id="nextBtn" aria-label="다음 달">→</button>
          <button class="btn sm" id="todayBtn">오늘</button>
        </span>
        <span class="spacer"></span>
        <div class="seg" id="viewToggle">
          <button data-view="calendar" class="active">캘린더</button>
          <button data-view="list">리스트</button>
        </div>
        <div class="seg" id="scopeFilter">
          <button data-scope="all" class="active">전체</button>
          <button data-scope="hcp">HCP</button>
          <button data-scope="internal">사내</button>
        </div>
      </div>
      <div class="filters">
        <input id="searchInput" type="search" placeholder="🔍 제목·제품 검색…" />
        <select id="filterCategory"><option value="">전체 카테고리</option></select>
        <select id="filterOwner"><option value="">전체 담당자</option></select>
      </div>
      <div class="cal-grid" id="calHead"></div>
      <div class="cal-grid" id="calBody"></div>
      <div class="list-view" id="listView" style="display:none"></div>
      <div class="legend" id="legend"></div>
    </section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop hidden">
    <div class="modal">
      <h3 id="modalTitle">콘텐츠 등록</h3>
      <div class="hint">카카오 발송 계획을 입력하세요. * 는 필수.</div>
      <div class="row">
        <div><label>발송일 *</label><input type="date" id="f-sendDate" /></div>
        <div><label>발송시간 *</label><input type="time" id="f-sendTime" value="10:00" /></div>
      </div>
      <label>제목 *</label><input id="f-title" placeholder="예: 여름 건강관리 뉴스레터" />
      <label>연결 링크</label><input id="f-link" placeholder="https://" />
      <div class="row">
        <div><label>카테고리</label><input id="f-category" list="dl-category" placeholder="뉴스레터 등" /></div>
        <div><label>제품명</label><input id="f-product" list="dl-product" /></div>
      </div>
      <div class="row">
        <div><label>포맷</label><input id="f-format" list="dl-format" placeholder="텍스트+이미지 / 카드뉴스 등" /></div>
        <div><label>발송 타겟(진료과)</label><input id="f-target" list="dl-target" placeholder="예: 순환기내과" /></div>
      </div>
      <label>담당자</label>
      <select id="f-owner"><option value="">담당자 선택</option></select>
      <label>코멘트</label><textarea id="f-comment" rows="2"></textarea>

      <label class="ready-toggle" for="f-ready">
        <input type="checkbox" id="f-ready" />
        <span><span class="t">발송 준비 완료</span><br /><span class="d">체크하면 이번 주 준비 현황에 완료로 집계됩니다.</span></span>
      </label>

      <div id="resultSection" class="result-box" style="display:none">
        <h4>발송 후 결과</h4>
        <div class="row">
          <div><label>열람률(%)</label><input type="number" id="f-openRate" step="0.1" /></div>
          <div><label>피드백</label><input id="f-feedback" /></div>
        </div>
        <div class="hint" id="resultMeta" style="margin-top:6px"></div>
        <button class="btn sm" id="saveResultBtn" style="margin-top:10px">결과 저장</button>
      </div>

      <div class="modal-actions">
        <button class="btn sm" id="deleteBtn" style="display:none; color:var(--red); border-color:var(--red)">삭제</button>
        <div style="display:flex; gap:8px; margin-left:auto">
          <button class="btn sm" id="closeBtn">닫기</button>
          <button class="btn primary sm" id="saveBtn">등록</button>
        </div>
      </div>
    </div>
  </div>

  <div id="catModalBackdrop" class="modal-backdrop hidden">
    <div class="modal">
      <h3>🏷 카테고리 관리</h3>
      <div class="hint">색상·이름을 자유롭게 추가·수정·삭제할 수 있어요. 이름을 바꾸면 기존 콘텐츠에도 반영됩니다.</div>
      <div class="cat-list" id="catList"></div>
      <button class="btn sm" id="catAddBtn" style="margin-top:12px">+ 새 카테고리</button>
      <div class="modal-actions">
        <button class="btn primary sm" id="catCloseBtn" style="margin-left:auto">닫기</button>
      </div>
    </div>
  </div>

  <div id="importModalBackdrop" class="modal-backdrop hidden">
    <div class="modal" style="width:660px">
      <h3>📥 오픈 데이터 업데이트</h3>
      <div class="hint">엑셀에서 표(헤더 행 포함)를 복사해 붙여넣고 “분석”을 누르세요. 콘텐츠명으로 매칭 후보를 자동 선택하니, 확인·수정 후 “적용”하면 열람률·발송·실패율이 저장됩니다.</div>
      <textarea id="pasteArea" rows="4" placeholder="여기에 붙여넣기 (엑셀에서 복사 = 탭 구분)"></textarea>
      <div style="margin-top:8px"><button class="btn sm" id="parseBtn">분석</button></div>
      <div id="matchTable" style="margin-top:12px; max-height:340px; overflow:auto"></div>
      <div class="modal-actions">
        <button class="btn sm" id="importCloseBtn">닫기</button>
        <button class="btn primary sm" id="applyImportBtn" style="display:none; margin-left:auto">적용</button>
      </div>
    </div>
  </div>

  <datalist id="dl-category"></datalist>
  <datalist id="dl-product"></datalist>
  <datalist id="dl-format"></datalist>
  <datalist id="dl-target"></datalist>

  <script type="module" src="./app.js"></script>
</body>
</html>
